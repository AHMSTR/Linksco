<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linksco</title>
  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .chain-wrapper {
      width: 400px;
      filter: drop-shadow(12px 12px 20px #d9d9d9) drop-shadow(-12px -12px 20px #ffffff);
    }
  </style>
</head>
<body>
  <div class="chain-wrapper">
    <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8e8e8" />
          <stop offset="50%" stop-color="#b0b0b0" />
          <stop offset="100%" stop-color="#5a5a5a" />
        </linearGradient>
        <filter id="softBlur">
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" />
        </filter>
      </defs>

      <!-- Link 1 - top, blurred/out of focus -->
      <g opacity="0.4" filter="url(#softBlur)" transform="translate(150, 60) rotate(-15)">
        <rect x="-18" y="-45" width="36" height="90" rx="18" fill="none" stroke="url(#metal)" stroke-width="12" />
      </g>

      <!-- Link 2 - middle -->
      <g opacity="0.7" transform="translate(150, 160) rotate(10)">
        <rect x="-20" y="-50" width="40" height="100" rx="20" fill="none" stroke="url(#metal)" stroke-width="14" />
      </g>

      <!-- Link 3 - bottom, in focus -->
      <g transform="translate(150, 280) rotate(-5)">
        <rect x="-22" y="-55" width="44" height="110" rx="22" fill="none" stroke="url(#metal)" stroke-width="16" />
        <!-- wear marks -->
        <path d="M -22,-10 A 22,22 0 0 1 22,-10" stroke="#3a3a3a" stroke-width="2" fill="none" opacity="0.6"/>
        <path d="M -22,10 A 22,22 0 0 0 22,10" stroke="#3a3a3a" stroke-width="2" fill="none" opacity="0.6"/>
      </g>

      <!-- Link 4 - tail -->
      <g transform="translate(150, 395) rotate(0)">
        <rect x="-18" y="-40" width="36" height="80" rx="18" fill="none" stroke="url(#metal)" stroke-width="14" />
      </g>
    </svg>
  </div>
</body>
</html>
