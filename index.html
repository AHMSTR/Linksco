<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ramabhadra&display=swap" rel="stylesheet">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Ramabhadra", sans-serif;;
      background: #ffffff;
      min-height: 100vh;
      padding: 40px 60px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ramabhadra-regular {
      font-family: "Ramabhadra", sans-serif;
      font-weight: 400;
      font-style: normal;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing:;
      color: #000;
      text-transform: uppercase;
    }
    .btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 13px 29px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      cursor: pointer;
      transition: transform 0.2s ease;
      text-decoration: none;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    .btn:focus {
      transform: scale(1.05);
    }
    .btn:active {
      transform: none;
    }
    @media (max-width: 768px) {
      body {
        padding: 30px 20px;
      }
      .logo {
        font-size: 1.3rem;
      }
      .btn {
        padding: 10px 20px;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">LINKSCO</div>
    <a href="mailto:info@linksco.co.za" class="btn">GET IN TOUCH</a>
  </header>
