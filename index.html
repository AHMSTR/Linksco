<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f2f2f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      transition: opacity 0.3s ease;
    }
    body {
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-weight: 400;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 29.4px 58.8px;
      color: #444;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      max-width: 100%;
    }
    .logo {
      font-size: 1.54265769rem;
      font-weight: 400;
      color: #333;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      line-height: 1.1;
      white-space: nowrap;
    }
    .btn {
      background: #f2f2f2;
      color: #444;
      border: none;
      padding: 13.9944px 31.9872px;
      border-radius: 49px;
      font-size: 0.90500299686rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.67138134px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: "Atkinson Hyperlegible", sans-serif;
      box-shadow: 
        7.84px 7.84px 15.68px #d9d9d9,
        -7.84px -7.84px 15.68px #ffffff;
      transition: all 0.2s ease;
    }
    .btn:hover {
      box-shadow: 
        3.92px 3.92px 7.84px #d9d9d9,
        -3.92px -3.92px 7.84px #ffffff;
    }
    .btn:active {
      box-shadow: 
        inset 3.92px 3.92px 7.84px #d9d9d9,
        inset -3.92px -3.92px 7.84px #ffffff;
    }

    .image-container {
      width: 100%;
      max-width: 100%;
      margin: 58.8px auto 0 auto;
      border-radius: 49px;
      padding: 19.6px;
      background: #f2f2f2;
      box-shadow: 
        14px 14px 28px #d9d9d9,
        -14px -14px 28px #ffffff;
      position: relative;
    }
    .image-container img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 29.4px;
      filter: grayscale(0%);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0.75;
    }

    /* Contact Form */
    .contact-section {
      max-width: 700px;
      margin: 78.4px auto 0 auto;
      text-align: center;
    }
    .contact-section h2 {
      font-size: 1.8rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 19.6px;
      color: #333;
    }
    .contact-section p {
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 39.2px;
      opacity: 0.8;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 19.6px;
      text-align: left;
    }
    .contact-form input, 
    .contact-form textarea {
      padding: 15.68px 23.52px;
      border-radius: 29.4px;
      border: none;
      background: #f2f2f2;
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-weight: 400;
      font-size: 0.95rem; /* desktop size */
      color: #444;
      box-shadow: 
        inset 5.88px 5.88px 11.76px #d9d9d9,
        inset -5.88px -5.88px 11.76px #ffffff;
      outline: none;
      transition: all 0.2s ease;
    }
    .contact-form input:focus, 
    .contact-form textarea:focus {
      box-shadow: 
        inset 3.92px 3.92px 7.84px #d9d9d9,
        inset -3.92px -3.92px 7.84px #ffffff;
    }
    .contact-form textarea { 
      min-height: 156.8px; 
      resize: vertical;
      border-radius: 29.4px;
    }
    .contact-form .btn {
      align-self: center;
      margin-top: 9.8px;
    }

    /* Footer */
    footer {
      margin-top: 98px;
      padding: 29.4px 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-top: 1px solid #e0e0e0;
      box-shadow: 0 -4px 8px -4px #d9d9d9;
    }

    /* MOBILE FIX: prevent iOS zoom */
    @media (max-width: 768px) {
      body {
        padding: 19.6px 19.6px;
      }
      .logo {
        font-size: 1.114141665rem;
      }
      .btn {
        padding: 9.996px 21.9912px;
        font-size: 0.78401115738rem;
        letter-spacing: 0.67138134px;
        border-radius: 49px;
      }
      .image-container {
        margin-top: 39.2px;
        padding: 14px;
        border-radius: 39.2px;
      }
      .contact-section {
        margin-top: 58.8px;
      }
      .contact-section h2 {
        font-size: 1.4rem;
      }
      footer {
        margin-top: 58.8px;
        padding: 19.6px 0;
      }

      /* KEY FIX */
      .contact-form input,
      .contact-form textarea {
        font-size: 16px; /* iOS won't zoom if >=16px */
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <a href="https://linksco.co.za" class="logo">LINKSCO</a>
      <a href="#contact" class="btn">Get in touch</a>
    </header>

    <div class="image-container">
      <img src="milad-fakurian-I4yMBCjVljo-unsplash.jpg" alt="Hero image" draggable="false" oncontextmenu="return false">
    </div>

    <section id="contact" class="contact-section">
      <h2>Let's Build Something</h2>
      <p>Have a project in mind? Send us a message and we'll get back to you.</p>
      
      <form class="contact-form" action="https://formsubmit.co/info@linksco.co.za" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Tell us about your project..." required></textarea>
        
        <input type="hidden" name="_subject" value="New enquiry from Linksco Website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://linksco.co.za">
        <input type="text" name="_honey" style="display:none">

        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    © 2026 LINKSCO. ALL RIGHTS RESERVED.
  </footer>

  <script>
    document.querySelectorAll('a[href^="http"], a.logo').forEach(link => {
      link.addEventListener('click', function(e) {
        const href = this.href;
        if (href.startsWith('mailto:') || href.startsWith('#')) {
          return; 
        }
        e.preventDefault();
        document.body.style.opacity = '0.7';
        setTimeout(() => {
          window.location.href = href;
        }, 1000);
      });
    });

    document.addEventListener('contextmenu', e => {
      if(e.target.tagName === 'IMG') e.preventDefault();
    });

    document.addEventListener('dragstart', e => {
      if(e.target.tagName === 'IMG') e.preventDefault();
    });
  </script>
</body>
</html>
