<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ramabhadra&display=swap" rel="stylesheet">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Ramabhadra", sans-serif;
      background: #000;
      min-height: 100vh;
      padding: 30px 60px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.543275rem;
      font-weight: 400;
      color: #fff;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      line-height: 1.1;
    }
    .logo:visited, .logo:active, .logo:focus {
      color: #fff;
      outline: none;
    }
    .btn {
      background: #000;
      color: #fff;
      border: 1.5px solid #fff;
      padding: 11.26480142px 26.84564409px;
      border-radius: 50px;
      font-size: 0.79954324222rem;
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn svg {
      width: 1em;
      height: 1em;
      flex-shrink: 0;
      fill: currentColor;
    }
    .btn:active, .btn:focus {
      background: #000;
      color: #fff;
      transform: none;
      outline: none;
    }
    @media (max-width: 768px) {
      body {
        padding: 20px 20px;
      }
      .logo {
        font-size: 1.1145875rem;
      }
      .btn {
        padding: 8.34339342px 18.08142009px;
        font-size: 0.69293626416rem;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="https://linksco.co.za" class="logo">LINKSCO</a>
    <a href="mailto:info@linksco.co.za" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5L4 8V6l8 5 8-5v2Z"/>
      </svg>
      info@linksco.co.za
    </a>
  </header>
</body>
</html>
