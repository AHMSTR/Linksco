<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      padding: 40px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem; /* was 2.5rem, -40% */
      font-weight: 900;
      letter-spacing: 1.2px; /* slightly reduced */
      color: #000;
      text-transform: uppercase;
    }

    .btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 11px 24px; /* was 18px 40px, -40% */
      border-radius: 50px;
      font-size: 0.6rem; /* was 1rem, -40% */
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      body {
        padding: 30px 20px;
      }
      .logo {
        font-size: 1.08rem;
      }
      .btn {
        padding: 8px 17px;
        font-size: 0.54rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">LINKSCO</div>
    <button class="btn">GET IN TOUCH</button>
  </header>
</body>
