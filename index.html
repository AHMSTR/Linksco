<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f2f2f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-weight: 400;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 29.4px 58.8px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      max-width: 100%;
    }
    .logo {
      font-size: 1.54265769rem;
      font-weight: 400;
      color: #333;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      line-height: 1.1;
      white-space: nowrap;
    }
    .btn {
      background: #f2f2f2;
      color: #444;
      border: none;
      padding: 13.9944px 31.9872px;
      border-radius: 49px;
      font-size: 0.90500299686rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.67138134px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 
        7.84px 7.84px 15.68px #d9d9d9,
        -7.84px -7.84px 15.68px #ffffff;
      transition: all 0.2s ease;
    }
    .btn:hover {
      box-shadow: 
        3.92px 3.92px 7.84px #d9d9d9,
        -3.92px -3.92px 7.84px #ffffff;
    }
    .btn:active {
      box-shadow: 
        inset 3.92px 3.92px 7.84px #d9d9d9,
        inset -3.92px -3.92px 7.84px #ffffff;
    }

    .image-container {
      width: 100%;
      max-width: 100%;
      margin: 58.8px auto 0 auto;
      border-radius: 49px;
      padding: 19.6px;
      background: #f2f2f2;
      box-shadow: 
        14px 14px 28px #d9d9d9,
        -14px -14px 28px #ffffff;
    }
    .image-container img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 29.4px;
      filter: grayscale(100%);
    }

    @media (max-width: 768px) {
      body {
        padding: 19.6px 19.6px;
      }
      .logo {
        font-size: 1.114141665rem;
      }
      .btn {
        padding: 9.996px 21.9912px;
        font-size: 0.78401115738rem;
        letter-spacing: 0.67138134px;
        border-radius: 49px;
      }
      .image-container {
        margin-top: 39.2px;
        padding: 14px;
        border-radius: 39.2px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="https://linksco.co.za" class="logo">LINKSCO</a>
    <a href="mailto:info@linksco.co.za" class="btn">Get in touch</a>
  </header>

  <div class="image-container">
    <img src="milad-fakurian-UiiHVEyxtyA-unsplash.jpg" alt="Hero image">
  </div>

  <script>
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.href;
        setTimeout(() => {
          window.location.href = href;
        }, 1000);
      });
    });
  </script>
</body>
</html>
