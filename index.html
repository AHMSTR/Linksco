<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ramabhadra&display=swap" rel="stylesheet">
  <title>Linksco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Ramabhadra", sans-serif;
      background: #ffffff;
      min-height: 100vh;
      padding: 30px 60px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.543275rem;
      font-weight: 400;
      color: #000;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      line-height: 1.1;
    }
    .logo:visited, .logo:active, .logo:focus {
      color: #000;
      outline: none;
    }
    .btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 13.615875px 30.373875px;
      border-radius: 50px;
      font-size: 0.78553125rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:active, .btn:focus {
      background: #000;
      color: #fff;
      transform: none;
      outline: none;
    }
    @media (max-width: 768px) {
      body {
        padding: 20px 20px;
      }
      .logo {
        font-size: 1.1145875rem;
      }
      .btn {
        padding: 10.47375px 20.9475px;
        font-size: 0.68079375rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="https://linksco.co.za" class="logo">LINKSCO</a>
    <a href="mailto:info@linksco.co.za" class="btn">GET IN TOUCH</a>
  </header>
</body>
</html>
