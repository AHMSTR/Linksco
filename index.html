<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKSCO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      padding: 40px 60px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      height: 1.8rem;
    }
    .logo img {
      height: 1.8rem;
      width: auto;
    }
    .btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 13px 29px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    @media (max-width: 768px) {
      body {
        padding: 30px 20px;
      }
      .logo {
        height: 1rem;
      }
      .logo img {
        height: 1rem;
      }
      .btn {
        padding: 10px 20px;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="linksco.svg" alt="LINKSCO">
    </div>
    <button class="btn">GET IN TOUCH</button>
  </header>
</body>
</html>
